[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings (used when running with --cov)
addopts = --tb=short -q

# Ignore slow/external test directories by default
# (integration tests require a running server — opt-in with -m integration)
markers =
    integration: marks tests as integration tests (require running server)
    slow: marks tests as slow-running
    gpu: marks tests as requiring GPU hardware
