# Hardwareless AI — CI Pipeline
# Runs: lint, type check, unit tests, property tests, security audit, fuzzing, build
# File: .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.9"
  POETRY_VERSION: "1.7"

jobs:
  # ——————————————————————————————
  # Lint & Type Check
  # ——————————————————————————————
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy types-requests
          pip install -e . --quiet
      - name: Black formatting check
        run: black --check .
      - name: isort import order check
        run: isort --check-only .
      - name: Flake8 lint
        run: flake8 --max-line-length=120 --exclude=venv,build,dist .
      - name: MyPy type check
        run: mypy --ignore-missing-imports gateway/ core_engine/ || true  # Optional for now

  # ——————————————————————————————
  # Unit Tests
  # ——————————————————————————————
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e . pytest pytest-asyncio
          pip install hypothesis  # property tests
      - name: Run unit tests
        run: |
          pytest -v --tb=short
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # ——————————————————————————————
  # Property Tests (Hypothesis)
  # ——————————————————————————————
  property:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: |
          pip install -e . pytest hypothesis numpy
      - name: Run property tests
        run: |
          pytest tests/property/ -v --tb=short -x

  # ——————————————————————————————
  # Security Audit
  # ——————————————————————————————
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install audit tools
        run: |
          pip install bandit safety
      - name: Bandit scan
        run: bandit -r core_engine/ gateway/ -f json -o bandit-report.json || true
      - name: Safety check (vulns)
        run: safety check --json || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: bandit-report.json
        continue-on-error: true

  # ——————————————————————————————
  # Build & Publish (on tag)
  # ——————————————————————————————
  build:
    runs-on: ubuntu-latest
    needs: [test, property, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/hardwareless-ai/gateway:${{ github.ref_name }}
            ghcr.io/hardwareless-ai/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ——————————————————————————————
  # Mutation Testing (on schedule or manually)
  # ——————————————————————————————
  mutation:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install mutmut
        run: pip install mutmut
      - name: Run mutation testing
        run: |
          mutmut run --paths-to-mutate=core_engine/
          mutmut results
        continue-on-error: true
