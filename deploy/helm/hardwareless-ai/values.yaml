# Hardwareless AI — Helm Chart
# charts/hardwareless-ai/

apiVersion: v2
name: hardwareless-ai
description: "Hardwareless AI — GPU/CPU-less HDC-based AI platform"
type: application
version: 0.3.0
appVersion: "0.3.0"
keywords:
  - ai
  - hdc
  - hyperdimensional
  - fastapi
  - nextjs
home: https://github.com/hardwareless-ai/hardwareless-ai
sources:
  - https://github.com/hardwareless-ai/hardwareless-ai
maintainers:
  - name: Luke West
    email: lukewest@hardwareless.ai

# Dependencies
dependencies: []

# Values
---
# Default values for hardwareless-ai.
# This is a YAML-formatted file.

replicaCount: 3

image:
  repository: hardwarelessai/gateway
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: LoadBalancer
  port: 8000
  targetPort: 8000
  annotations: {}

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.hardwareless.ai
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: tls-secret
  #    hosts:
  #      - api.hardwareless.ai

resources:
  limits:
    cpu: "2"
    memory: "2Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

volumes:
  - name: data
    persistentVolumeClaim:
      claimName: hdc-data-pvc

volumeMounts:
  - name: data
    mountPath: /data

nodeSelector: {}

tolerations: []

affinity: {}

# Configuration
config:
  ENVIRONMENT: "production"
  LOG_LEVEL: "WARNING"
  HDC_BACKEND: "legacy-numpy"
  DEFAULT_NODE_COUNT: "17"
  CORS_ALLOW_ORIGINS: "https://app.hardwareless.ai"
  SECURITY_HEADERS_ENABLED: "1"
  INPUT_VALIDATION_ENABLED: "1"
  ENABLE_REQUEST_SIGNING: "1"
  ENABLE_GRAPHQL: "1"
  # Override via --set
  # REQUEST_SIGNING_SECRET: ""

# Secrets
secrets:
  REQUEST_SIGNING_SECRET: "change-me-in-prod"

# Additional labels
labels: {}

# Prometheus monitoring (optional)
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: monitoring
    interval: 30s
    path: /metrics
